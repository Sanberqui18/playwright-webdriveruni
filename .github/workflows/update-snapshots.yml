name: Update Snapshots

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to update snapshots on'
        required: true
        default: 'main'

permissions:
  contents: write
  pull-requests: write

jobs:
  update-snapshots:
    name: "Generate Linux Snapshots"
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Update snapshots
        run: npx playwright test autocomplete.text.spec.ts --update-snapshots
        env:
          CI: true
          COUPON: ${{ secrets.COUPON }}
          USERNAME: ${{ secrets.USERNAME }}
          PASSWORD: ${{ secrets.PASSWORD }}
          DISCOUNT: ${{ secrets.DISCOUNT }}

      - name: Open PR with updated snapshots
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: chore/update-snapshots-linux
          commit-message: "chore: update playwright snapshots for linux"
          title: "chore: update playwright snapshots for linux"
          body: |
            Automated snapshot update generated by the **Update Snapshots** workflow.

            - Platform: `ubuntu-22.04` (linux)
            - Browser: `chromium`
            - Triggered by: @${{ github.actor }}
          labels: "automated, snapshots"
          delete-branch: true
